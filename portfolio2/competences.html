<!DOCTYPE html>

<body>

    <canvas id="particles"></canvas>

    <div class="cursor"></div>

    <nav class="navbar">

        <a href="competences.html">Compétences</a>

    <!-- COMPETENCES -->
    <section class="hidden holographic">
        <div class="hud-window">

            <div class="hud-header">

                <div class="hud-dots">
                    <span></span>

            <div class="hud-grid">

                <div>

                        <div class="bar">

                            <div class="progress" style="width:60%"></div>

                <div>
                    <ul class="traits">
                        <li>✔️ Créatif</li>
                        <li>✔️ Persévérant</li>

                    </ul>
                </div>

            </div>

        </div>

        <div class="hud-window">

            <div class="hud-header">
                <h2 class="gradient-text">Profil</h2>
            </div>

            <canvas id="chart"></canvas>

        </div>

    <script src="script.js"></script>
